<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso anticipato — Fatture per Forfettari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:#0f2d1e;
  font-family:'DM Sans',system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
.container{
  width:100%;
  max-width:420px;
  padding:24px 20px;
}
h1{
  font-family:'Fraunces',serif;
  font-size:42px;
  line-height:1.05;
  letter-spacing:-0.03em;
  margin-bottom:12px;
}
h1 em{
  color:#E8D5A0;
  font-style:italic;
  font-weight:400;
}
.sub{
  color:rgba(255,255,255,.6);
  font-size:16px;
  margin-bottom:28px;
}
.input{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1.5px solid transparent;
  font-size:16px;
  margin-bottom:10px;
  outline:none;
  transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;
}
.input:focus{
  border-color:#52B788;
  box-shadow:0 0 0 3px rgba(82,183,136,.12);
}
.input.error{
  border-color:#EF4444;
  box-shadow:0 0 0 3px rgba(239,68,68,.12);
  animation:shake .32s ease;
}
.button{
  width:100%;
  padding:16px;
  border-radius:999px;
  border:none;
  background:#1B4332;
  color:white;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}
.meta{
  text-align:center;
  font-size:13px;
  color:rgba(255,255,255,.5);
  margin-top:12px;
}
.success{
  display:none;
  text-align:center;
  animation:fadeUp .5s ease;
}
.check{
  width:64px;
  height:64px;
  border-radius:50%;
  background:rgba(82,183,136,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
  font-size:28px;
  transform:scale(.8);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes pop{
  to{transform:scale(1)}
}
.back-home{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-top:18px;
  padding:14px 22px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:background .2s ease, transform .2s ease, border-color .2s ease;
}
.back-home:hover{
  background:rgba(255,255,255,.1);
  border-color:rgba(255,255,255,.22);
  transform:translateY(-1px);
}
.error-msg{
  display:none;
  margin-top:10px;
  color:#FCA5A5;
  font-size:13px;
  line-height:1.4;
  animation:fadeUp .25s ease;
}
.button.loading{
  opacity:.8;
  pointer-events:none;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-4px)}
  50%{transform:translateX(4px)}
  75%{transform:translateX(-2px)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="container">

<div id="form">
  <h1>Una mail.<br><em>Fine.</em></h1>
  <div class="sub">Ti scriviamo appena puoi provarla.</div>

  <input class="input" type="email" placeholder="la-tua@email.it" id="email" autocomplete="email">

  <button class="button" id="submitBtn" onclick="submitForm()">Avvisami quando è pronta</button>

  <div class="meta">
    Niente carta. Ti scriviamo solo quando si apre la prova.
  </div>
  <div class="error-msg" id="errorMsg">Inserisci una email valida.</div>
</div>

<div id="success" class="success">
  <div class="check">✓</div>
  <h1 style="font-size:32px;">Perfetto.</h1>
  <div class="sub">Ti scriviamo appena si apre la prova.</div>
  <div class="meta">Per domande: info@fattureperforfettari.it</div>
  <a href="index.html" class="back-home">Torna alla homepage</a>
</div>

</div>


<script>
function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
}

async function submitForm(){
  const emailInput = document.getElementById('email');
  const email = emailInput.value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  emailInput.classList.remove('error');
  errorMsg.style.display = 'none';

  if(!isValidEmail(email)){
    emailInput.classList.add('error');
    errorMsg.textContent = "Inserisci una email valida.";
    errorMsg.style.display = 'block';
    return;
  }

  submitBtn.classList.add('loading');
  submitBtn.textContent = "Invio in corso...";

  try{
    const res = await fetch("https://formspree.io/f/xgoreyrd", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({ email })
    });

    if(res.ok){
      document.getElementById('form').style.display='none';
      document.getElementById('success').style.display='block';
    } else {
      emailInput.classList.add('error');
      errorMsg.textContent = "Qualcosa non ha funzionato. Riprova.";
      errorMsg.style.display = 'block';
      submitBtn.classList.remove('loading');
      submitBtn.textContent = "Avvisami quando è pronta";
    }

  } catch(err){
    emailInput.classList.add('error');
    errorMsg.textContent = "Errore di connessione. Riprova.";
    errorMsg.style.display = 'block';
    submitBtn.classList.remove('loading');
    submitBtn.textContent = "Avvisami quando è pronta";
  }
}
</script>


</body>
</html>
